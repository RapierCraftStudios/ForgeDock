name: Check Command Conflicts

on:
  pull_request:
    paths:
      - 'commands/**'
      - 'docs/FORGE-PROTOCOL.md'
      - 'docs/WORKFLOW.md'
      - 'docs/site/command-reference.md'
      - 'scripts/check-native-conflicts.sh'
      - 'scripts/check-protocol-restatements.sh'
      - 'scripts/check-command-docs-drift.sh'
      - 'scripts/check-command-side-effects.sh'
      - 'scripts/check-spec-markers.sh'
      - 'scripts/check-admission-parity.mjs'
      - 'bin/engine/admission.mjs'
      - '.github/workflows/check-commands.yml'
  push:
    branches:
      - staging
      - main
    paths:
      - 'commands/**'
      - 'docs/FORGE-PROTOCOL.md'
      - 'docs/WORKFLOW.md'
      - 'docs/site/command-reference.md'
      - 'scripts/check-native-conflicts.sh'
      - 'scripts/check-protocol-restatements.sh'
      - 'scripts/check-command-docs-drift.sh'
      - 'scripts/check-command-side-effects.sh'
      - 'scripts/check-spec-markers.sh'
      - 'scripts/check-admission-parity.mjs'
      - 'bin/engine/admission.mjs'
      - '.github/workflows/check-commands.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-native-conflicts:
    name: Native command conflict check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check native command conflicts
        run: bash scripts/check-native-conflicts.sh commands/

  check-protocol-restatements:
    name: Protocol restatement check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for FORGE protocol restatements in commands/
        run: bash scripts/check-protocol-restatements.sh commands/ docs/

  command-docs-drift:
    name: Command / docs drift check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check that every installable spec is documented and every reference section has a spec
        run: bash scripts/check-command-docs-drift.sh commands/ docs/site/command-reference.md

  banned-token-lint:
    name: Banned token lint
    runs-on: ubuntu-latest
    env:
      # Single source of truth for the banned-token pattern. Both the production
      # step and the self-test step below reference this same job-level env var
      # instead of each carrying their own literal copy. Previously the two steps
      # each hardcoded an identical regex string; if one copy were ever edited
      # (e.g. a token added/removed) without updating the other, the self-test
      # would keep passing against its own stale pattern while the real gate
      # silently drifted out of sync — the exact class of bug forge#2233 fixed
      # one layer down (an unscoped allowlist exemption). See forge#2274.
      #
      # Notes on pattern precision:
      # - 'alterlab'  — matched case-insensitively; no false positives expected
      # - '\bememo\b' — word-boundary match excludes React's 'useMemo'/'React.memo'
      # - 'EMEMO_EOF' — exact uppercase heredoc token; no false positives expected
      # - 'is_byop'   — exact token; no false positives expected
      # - 'byop_discount' — exact token; no false positives expected
      #
      # No allowlist/exemption mechanism: an unscoped `<!-- allowlist: -->` opt-out
      # previously let ANY line suppress ANY banned token, which defeated the point
      # of this gate (see forge#2233). If a legitimate need for an exemption ever
      # arises, it must be a token-specific, line-specific marker that this grep
      # explicitly and narrowly excludes — not a blanket prefix match.
      BANNED_TOKEN_PATTERN: '\balterlab\b|\bememo\b|EMEMO_EOF|\bis_byop\b|\bbyop_discount\b'

    steps:
      - uses: actions/checkout@v4

      - name: Check for banned product-specific tokens in commands/
        run: |
          # Fail if any command spec contains tokens tied to a specific product.
          # These tokens indicate AlterLab-specific residue that must not re-enter
          # the generic ForgeDock command corpus.
          #
          # Pattern is defined once, at job level, in $BANNED_TOKEN_PATTERN — see
          # that env var's comment above for precision notes and rationale.
          MATCHES=$(grep -rniE "$BANNED_TOKEN_PATTERN" commands/ \
            --include='*.md' \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Banned product-specific tokens found in commands/:"
            echo "$MATCHES"
            echo ""
            echo "Remove or replace these tokens before merging."
            exit 1
          fi
          echo "OK: No banned tokens found in commands/"

      - name: Self-test — banned token lint must catch a marked token (regression guard for forge#2233)
        run: |
          # Prove the lint logic itself still fires on a banned token, even one
          # decorated with what used to be a blanket allowlist marker. This runs
          # against a throwaway scratch file outside commands/ so it never pollutes
          # the real corpus, and it inverts the assertion: the self-test FAILS the
          # job if the banned-token pattern does NOT match.
          #
          # Uses the same $BANNED_TOKEN_PATTERN job-level env var as the production
          # step above, so this genuinely proves the production pattern still fires
          # rather than exercising a separately-maintained copy that could drift
          # (see forge#2274 — this step previously hardcoded its own literal copy).
          SCRATCH_DIR=$(mktemp -d)
          trap 'rm -rf "$SCRATCH_DIR"' EXIT
          cat > "$SCRATCH_DIR/self-test.md" <<'EOF'
          This line references alterlab and used to carry a blanket exemption. <!-- allowlist: AlterLab -->
          EOF
          SELF_TEST_MATCHES=$(grep -rniE "$BANNED_TOKEN_PATTERN" "$SCRATCH_DIR" \
            --include='*.md' \
            || true)
          if [ -z "$SELF_TEST_MATCHES" ]; then
            echo "ERROR: Self-test failed — a line containing 'alterlab' plus a marker was NOT flagged."
            echo "The banned-token lint regressed to allowing a blanket exemption. See forge#2233."
            exit 1
          fi
          echo "OK: Self-test confirms the banned-token lint catches 'alterlab' even with a marker present."

  portability-lint:
    name: Shell portability lint (no grep -P in specs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commands/ for non-portable grep -P / grep -oP patterns
        run: |
          # Fail if any command spec ADDS a line containing grep -P or grep -oP
          # (GNU-only PCRE). macOS BSD grep does not support -P; these patterns cause
          # silent empty-variable failures on any non-GNU platform.
          # Use grep -E / grep -oE + sed instead.
          #
          # Scope: diff-based — only the lines ADDED by this PR are checked.
          # This allows phased remediation of the existing corpus while enforcing
          # correctness on all new/modified spec files. A separate tracking issue
          # (#1608) covers migrating the full corpus. <!-- scope: diff-only; see #1608 -->
          #
          # Why added lines and not whole changed files (forge#2204): scanning the
          # full body of every touched file made this gate fire on pre-existing
          # violations the PR never introduced. Any PR editing one line of a spec
          # inherited that file's entire backlog, and a staging->main deploy PR —
          # whose diff spans the whole corpus — inherited all 93 known sites at once
          # and could never go green. That contradicts the phased-remediation intent
          # above: this gate exists to stop NEW violations, and #1608 owns retiring
          # the old ones. Scanning added lines enforces exactly that.
          #
          # Exclusions:
          # - Lines containing '<!-- allowlist:' are intentionally exempted.
          # - This check itself uses only grep -E (portable).
          #
          # Detect changed commands/*.md files in this PR (works for both push and PR events)
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          # Pathspec is 'commands/' (not 'commands/**/*.md'), with the .md filter left
          # to grep below. In a git pathspec '*' also matches '/', so '**/' cannot match
          # zero directories the way a shell globstar does — 'commands/**/*.md' silently
          # skipped every top-level spec (commands/issue.md, commands/replay.md, ...) and
          # only ever linted nested ones. Six top-level specs changed in the staging->main
          # range alone, none of them checked (forge#2204).
          CHANGED_SPECS=$(git diff --name-only "$BASE_SHA"...HEAD -- 'commands/' 2>/dev/null \
            | grep -E '\.md$' || true)
          if [ -z "$CHANGED_SPECS" ]; then
            echo "OK: No commands/*.md files changed in this PR — portability-lint skipped."
            exit 0
          fi
          echo "Checking lines added by this PR for grep -P / grep -oP patterns:"
          echo "$CHANGED_SPECS"
          echo ""
          MATCHES=""
          while IFS= read -r spec_file; do
            [ -f "$spec_file" ] || continue
            # Emit "<new-line-number>:<content>" for each line this PR adds, so the
            # error below still cites a real line number in the current file. -U0
            # yields no context lines, so every '+' line is an addition; the hunk
            # header's '+start' seeds the counter.
            FILE_MATCHES=$(git diff -U0 "$BASE_SHA"...HEAD -- "$spec_file" \
              | awk '
                  /^\+\+\+/ { next }
                  /^@@/ {
                    match($0, /\+[0-9]+/)
                    ln = substr($0, RSTART + 1, RLENGTH - 1) + 0
                    next
                  }
                  /^\+/ { print ln ":" substr($0, 2); ln++ }
                ' \
              | grep -E "grep\s+-[a-zA-Z]*P[ '\"]|grep\s+-oP[ '\"]|grep\s+-P[ '\"]" \
              | grep -v '<!-- allowlist:' || true)
            if [ -n "$FILE_MATCHES" ]; then
              MATCHES="${MATCHES}${spec_file}:${FILE_MATCHES}\n"
            fi
          done <<< "$CHANGED_SPECS"
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Non-portable grep -P / grep -oP added by this PR:"
            printf "%b" "$MATCHES"
            echo ""
            echo "Replace with grep -E / grep -oE + sed for portable extraction."
            echo "BSD grep (macOS) does not support -P (PCRE). See #786, #811, #1179."
            exit 1
          fi
          echo "OK: This PR adds no grep -P / grep -oP patterns to commands/ specs."

  spec-side-effects:
    name: Spec-as-code side-effect gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commands/ for unguarded side-effect verbs
        run: |
          # Fail if any command spec introduces:
          #   Class A: gh gist create/edit --public (always prohibited — gists must be secret)
          #   Class B: side-effect verb in a section with no DRY_RUN/governor guard (diff-aware)
          #
          # <!-- Added: forge#1609 -->
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            export GITHUB_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          fi
          bash scripts/check-command-side-effects.sh commands/

  spec-markers:
    name: Spec marker / placeholder check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check commands/ for unknown FORGE markers and workflow placeholders
        run: |
          # Fail if any command spec contains:
          #   - A FORGE: annotation marker not in the known registry (catches typos like FORGE:NOTES)
          #   - An unsubstituted {PLACEHOLDER} token in a .github/workflows/*.yml run block
          #
          # <!-- Added: forge#1609 -->
          bash scripts/check-spec-markers.sh commands/ .

  admission-parity:
    name: admission.mjs / bash mirror parity check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check bin/engine/admission.mjs CASCADE_PRESETS matches the phase-4-execution.md bash mirror
        run: |
          # bin/engine/admission.mjs is the typed, unit-tested reference implementation
          # of the cascade admission policy (forge#2234). The logic actually executed at
          # runtime is a hand-written bash/yq mirror in phase-4-execution.md's Step 4A.pre
          # `case "$CASCADE_POLICY_NAME" in ... esac` block — kept in sync by hand, with no
          # prior check catching divergence between the two (forge#2340).
          node scripts/check-admission-parity.mjs
