name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'commands/**'
      - 'bin/**'
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --provenance --access public

      - name: Save package.json before name mutation
        run: cp package.json package.json.orig

      - name: Publish to GitHub Packages
        run: |
          NPMRC="$RUNNER_TEMP/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > "$NPMRC"
          echo "@rapiercraftstudios:registry=https://npm.pkg.github.com" >> "$NPMRC"
          npm pkg set name="@rapiercraftstudios/forgedock"
          npm publish --access public --userconfig "$NPMRC"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package.json name
        if: always()
        run: mv package.json.orig package.json

      - name: Push version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push

      - name: Create GitHub Release
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
