name: Publish to npm

# ROLLBACK RUNBOOK (see forge#2025 / PR #2018 staging review finding REG-2):
# This workflow publishes to the `latest` npm dist-tag on every qualifying push
# to `main`. If a bad release is published:
#   1. Do NOT run `npm unpublish`. Unpublishing removes the version entirely,
#      which breaks any consumer that has already resolved/installed it and
#      forfeits the version number (npm blocks republishing the same version
#      for 24h+). It also does not un-ship whatever already propagated.
#   2. Instead: `git revert` the offending commit(s) on `main`, push the
#      revert, and let this workflow publish a new patch version containing
#      the revert. This is the only supported rollback path — a forward-fix
#      release, not a destructive unpublish.
#   3. If the bad release must be hidden from new installs immediately while
#      the revert is prepared, use `npm dist-tag` to move `latest` back to the
#      last-known-good version (this does not remove the bad version, it only
#      stops it from being the default resolution target):
#       npm dist-tag add forgedock@<last-good-version> latest
#
# The `concurrency` group below serializes publish runs so two qualifying
# pushes landing close together (e.g. a merge immediately followed by this
# workflow's own auto-generated "chore: bump version" push) cannot race on
# the version bump / npm publish steps.
concurrency:
  group: publish-main
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'commands/**'
      - 'bin/**'
      - '.claude-plugin/**'
      - 'docs/**'
      - 'scripts/**'
      - 'templates/**'
      - 'package.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:  # Manual retrigger for bot-token merges

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git describe --tags (path-guard check)

      - name: Check if publishable files changed
        run: |
          # Runs for both push and workflow_dispatch. workflow_dispatch has no
          # paths: filter (GitHub limitation), so this always needed to run for
          # that event. It must ALSO run on push: the push trigger's own
          # paths: filter includes this workflow's own file
          # ('.github/workflows/publish.yml', see forge#2278/#2284) so a push
          # touching only the workflow file satisfies the trigger without
          # touching any actually-publishable path. Re-diffing here (instead of
          # trusting the push paths: filter to mean "something publishable
          # changed") is what correctly sets SKIP_PUBLISH=true for that case.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found — proceeding with publish"
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          else
            CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD -- \
              commands/ bin/ .claude-plugin/ docs/ scripts/ templates/ package.json 2>/dev/null || echo "")
            if [ -z "$CHANGED" ]; then
              echo "No publish-relevant files changed since $LAST_TAG — skipping spurious dispatch"
              echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
            else
              echo "Publish-relevant changes detected since $LAST_TAG:"
              echo "$CHANGED"
              echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
            fi
          fi

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Check native command conflicts
        run: bash scripts/check-native-conflicts.sh commands/

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Determine version bump type
        if: env.SKIP_PUBLISH != 'true'
        run: |
          # Conventional-commit-aware bump: any feat()-scoped commit since the
          # last release tag bumps `minor`; otherwise `patch`. Major/breaking-change
          # detection is intentionally out of scope (no BREAKING CHANGE convention
          # is currently enforced in this repo — see forge#2036).
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found — defaulting to patch bump"
            echo "BUMP_TYPE=patch" >> $GITHUB_ENV
          else
            COMMIT_SUBJECTS=$(git log "$LAST_TAG"..HEAD --format=%s 2>/dev/null || echo "")
            if echo "$COMMIT_SUBJECTS" | grep -qE '^feat(\([^)]*\))?!?:'; then
              echo "feat()-scoped commit(s) found since $LAST_TAG — bumping minor"
              echo "BUMP_TYPE=minor" >> $GITHUB_ENV
            else
              echo "No feat()-scoped commits since $LAST_TAG — bumping patch"
              echo "BUMP_TYPE=patch" >> $GITHUB_ENV
            fi
          fi

      - name: Bump version
        if: env.SKIP_PUBLISH != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEXT_VERSION=$(node -p "
            const [maj,min,pat] = '$CURRENT_VERSION'.split('.').map(Number);
            const bumpType = '$BUMP_TYPE';
            if (bumpType === 'minor') {
              \`\${maj}.\${min+1}.0\`;
            } else {
              \`\${maj}.\${min}.\${pat+1}\`;
            }
          ")
          # Re-run guard: check if NEXT_VERSION (not the current committed version) was
          # already published. This correctly identifies the re-run case where a partial
          # failure left the bumped version on npm without committing it back to the repo.
          # Checking CURRENT_VERSION would always be true (the committed version is always
          # the last published version), which would permanently disable publishing.
          if npm show forgedock@"$NEXT_VERSION" version --silent 2>/dev/null | grep -q "$NEXT_VERSION"; then
            echo "Next version $NEXT_VERSION already published — re-run detected, skipping bump"
            echo "VERSION=$NEXT_VERSION" >> $GITHUB_ENV
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            npm version "$BUMP_TYPE" --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi

      - name: Publish to npm (OIDC trusted publishing)
        if: env.SKIP_PUBLISH != 'true'
        run: npm publish --provenance --access public

      - name: Save package.json before name mutation
        if: env.SKIP_PUBLISH != 'true'
        run: cp package.json package.json.orig

      - name: Publish to GitHub Packages
        if: env.SKIP_PUBLISH != 'true'
        run: |
          NPMRC="$RUNNER_TEMP/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" > "$NPMRC"
          echo "@rapiercraftstudios:registry=https://npm.pkg.github.com" >> "$NPMRC"
          npm pkg set name="@rapiercraftstudios/forgedock"
          npm publish --access public --userconfig "$NPMRC"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package.json name
        if: always() && env.SKIP_PUBLISH != 'true'
        run: mv package.json.orig package.json

      - name: Sync plugin.json version
        if: env.SKIP_PUBLISH != 'true'
        run: |
          node -e "
            const fs = require('fs');
            const version = require('./package.json').version;
            const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
            plugin.version = version;
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(plugin, null, 2) + '\n');
            console.log('Synced .claude-plugin/plugin.json to version ' + version);
          "

      - name: Push version bump
        if: env.SKIP_PUBLISH != 'true'
        run: |
          git add package.json .claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push

      - name: Create GitHub Release
        if: env.SKIP_PUBLISH != 'true'
        run: |
          # Idempotent: if the release already exists (e.g. on a re-run), skip gracefully.
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --generate-notes \
          || gh release view "v${{ env.VERSION }}" --json tagName --jq '"Release v${{ env.VERSION }} already exists — skipping creation"'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
