name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'commands/**'
      - 'bin/**'
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          # Re-run guard: if the current version (as checked out) was already published,
          # the push already happened in a previous run — reuse it and skip the bump.
          # This prevents a version gap when a post-publish step (release creation) fails
          # and the workflow is re-run: the checkout now has the bumped-and-pushed version,
          # so bumping again would skip a number.
          if npm show forgedock@"$CURRENT_VERSION" version --silent 2>/dev/null | grep -q "$CURRENT_VERSION"; then
            echo "Current version $CURRENT_VERSION already published — skipping bump, reusing version"
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi

      - name: Publish to npm (OIDC trusted publishing)
        if: env.SKIP_PUBLISH != 'true'
        run: npm publish --provenance --access public

      - name: Save package.json before name mutation
        if: env.SKIP_PUBLISH != 'true'
        run: cp package.json package.json.orig

      - name: Publish to GitHub Packages
        if: env.SKIP_PUBLISH != 'true'
        run: |
          NPMRC="$RUNNER_TEMP/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > "$NPMRC"
          echo "@rapiercraftstudios:registry=https://npm.pkg.github.com" >> "$NPMRC"
          npm pkg set name="@rapiercraftstudios/forgedock"
          npm publish --access public --userconfig "$NPMRC"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore package.json name
        if: always() && env.SKIP_PUBLISH != 'true'
        run: mv package.json.orig package.json

      - name: Push version bump
        if: env.SKIP_PUBLISH != 'true'
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ env.VERSION }} [skip ci]"
          git push

      - name: Create GitHub Release
        run: |
          # Idempotent: if the release already exists (e.g. on a re-run), skip gracefully.
          gh release create "v${{ env.VERSION }}" \
            --title "v${{ env.VERSION }}" \
            --generate-notes \
          || gh release view "v${{ env.VERSION }}" --json tagName --jq '"Release v${{ env.VERSION }} already exists — skipping creation"'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
