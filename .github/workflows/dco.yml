name: DCO Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    name: DCO Sign-Off Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Check DCO sign-off
        uses: KineticCafe/actions-dco@1da04282bbf757dab7d92a5c8535dbfb8113da5c # v3.1.0
        with:
          config: |
            # Project maintainer emails — exempt from DCO sign-off
            exempt-authors = ["yash.dubey803at@gmail.com", "rapiercraftstudios@gmail.com"]

            comment = true

            # Allow these bots to skip the DCO requirement
            [bots]
            policy = "allowlist"
            allow = ["github-actions[bot]", "dependabot[bot]", "dependabot-preview[bot]", "rapiercraft-forgedock[bot]", "rapiercraft-forge[bot]"]

            # Map commit author emails to accepted sign-off emails
            [alias-signoffs.aliases]
            "rapiercraftstudios@gmail.com" = ["yash.dubey803at@gmail.com"]
