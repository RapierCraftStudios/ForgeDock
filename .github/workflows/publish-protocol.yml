name: Publish @forgedock/protocol to npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/protocol/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      packages: write

    defaults:
      run:
        working-directory: packages/protocol

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Guard — protocol schema change requires a version bump
        working-directory: .
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          # Diff against the actual pre-push SHA (github.event.before), not just HEAD^ —
          # HEAD^ only sees the last commit of a push and silently misses a schema change
          # made in an earlier (non-tip) commit of a multi-commit push or rebase-merge.
          # workflow_dispatch has no "before" SHA, so fall back to HEAD^ there (single-commit
          # semantics are the best available signal for a manual run).
          BASE_SHA="$EVENT_BEFORE"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD^"
          fi
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "::error::Could not resolve base commit ($BASE_SHA) for schema-diff — fetch depth may be insufficient, or this is the repo's first commit. Failing closed."
            exit 1
          fi

          if ! CHANGED_SRC=$(git diff --name-only "$BASE_SHA" HEAD -- 'packages/protocol/src/**' 2>&1); then
            echo "::error::git diff against $BASE_SHA failed — failing closed rather than silently skipping the guard."
            echo "$CHANGED_SRC"
            exit 1
          fi

          if [ -n "$CHANGED_SRC" ]; then
            if ! OLD_PKG_JSON=$(git show "${BASE_SHA}:packages/protocol/package.json" 2>&1); then
              echo "::error::Could not read packages/protocol/package.json at $BASE_SHA — failing closed. This guard must not silently pass when it cannot verify a version bump occurred."
              exit 1
            fi
            OLD_VERSION=$(echo "$OLD_PKG_JSON" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).version)" 2>/dev/null || echo "")
            NEW_VERSION=$(node -p "require('./packages/protocol/package.json').version")
            if [ -z "$OLD_VERSION" ]; then
              echo "::error::Could not parse previous packages/protocol/package.json version at $BASE_SHA — failing closed."
              exit 1
            fi
            if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
              echo "::error::packages/protocol/src/ changed but package.json version ($NEW_VERSION) did not change (base: $BASE_SHA). Bump the version — see packages/protocol/README.md versioning policy."
              echo "Changed files:"
              echo "$CHANGED_SRC"
              exit 1
            fi
            echo "Schema files changed; version ${OLD_VERSION} -> ${NEW_VERSION} (base: $BASE_SHA) — OK"
          else
            echo "No changes under packages/protocol/src/ (base: $BASE_SHA) — skipping version-bump guard"
          fi

      - name: Run tests
        run: node --test "test/**/*.test.mjs"

      - name: Run conformance suite
        run: node src/cli.js fixtures/

      - name: Check if version already published
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm show "${PKG_NAME}@${PKG_VERSION}" version --silent 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "Version ${PKG_VERSION} already published — skipping"
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi

      - name: Publish to npm (OIDC trusted publishing)
        if: env.SKIP_PUBLISH != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: env.SKIP_PUBLISH != 'true'
        run: |
          NPMRC="$RUNNER_TEMP/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" > "$NPMRC"
          echo "@forgedock:registry=https://npm.pkg.github.com" >> "$NPMRC"
          npm publish --access public --userconfig "$NPMRC"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
