name: Publish @forgedock/protocol to npm

on:
  push:
    branches: [main]
    paths:
      - 'packages/protocol/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      packages: write

    defaults:
      run:
        working-directory: packages/protocol

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Guard — protocol schema change requires a version bump
        working-directory: .
        run: |
          CHANGED_SRC=$(git diff --name-only HEAD^ HEAD -- 'packages/protocol/src/**' 2>/dev/null || echo "")
          if [ -n "$CHANGED_SRC" ]; then
            OLD_VERSION=$(git show HEAD^:packages/protocol/package.json 2>/dev/null | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0,'utf8')).version)" 2>/dev/null || echo "")
            NEW_VERSION=$(node -p "require('./packages/protocol/package.json').version")
            if [ -z "$OLD_VERSION" ]; then
              echo "::error::Could not determine previous packages/protocol/package.json version at HEAD^ — failing closed. This guard must not silently pass when it cannot verify a version bump occurred."
              exit 1
            fi
            if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
              echo "::error::packages/protocol/src/ changed but package.json version ($NEW_VERSION) did not change. Bump the version — see packages/protocol/README.md versioning policy."
              echo "Changed files:"
              echo "$CHANGED_SRC"
              exit 1
            fi
            echo "Schema files changed; version ${OLD_VERSION} -> ${NEW_VERSION} — OK"
          else
            echo "No changes under packages/protocol/src/ — skipping version-bump guard"
          fi

      - name: Run tests
        run: node --test "test/**/*.test.mjs"

      - name: Run conformance suite
        run: node src/cli.js fixtures/

      - name: Check if version already published
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm show "${PKG_NAME}@${PKG_VERSION}" version --silent 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "Version ${PKG_VERSION} already published — skipping"
            echo "SKIP_PUBLISH=true" >> $GITHUB_ENV
          else
            echo "SKIP_PUBLISH=false" >> $GITHUB_ENV
          fi

      - name: Publish to npm (OIDC trusted publishing)
        if: env.SKIP_PUBLISH != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: env.SKIP_PUBLISH != 'true'
        run: |
          NPMRC="$RUNNER_TEMP/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${GH_TOKEN}" > "$NPMRC"
          echo "@forgedock:registry=https://npm.pkg.github.com" >> "$NPMRC"
          npm publish --access public --userconfig "$NPMRC"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
