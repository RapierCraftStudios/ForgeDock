name: CI

# Runs the repo's unit-test suite (`npm test` = `node --test "bin/tests/**/*.test.mjs"`)
# on every PR and on push to staging/main.
#
# Closes the visibility gap identified in forge#1581: before this workflow,
# no CI job ran the suite at all, so failing tests (including CLI-breaking
# regressions) were invisible on PRs and could reach a deploy candidate
# without ever failing a check. `publish.yml` runs `npm test` too, but only
# as a post-merge step on push to `main` gated to publish-relevant paths —
# it never runs on PRs, so it can't stop a bad change before merge.
#
# This job intentionally has no continue-on-error: a red result here is the
# desired, correct signal — it is not masked or auto-passed.

on:
  pull_request:
  push:
    branches:
      - staging
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (node --test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests
        run: npm test
