name: Deploy Gate Marker Check

# Verifies that staging→main PRs have a FORGE:GATE_PASS or FORGE:GATE_FAILURE
# marker comment before merge is allowed. Closes the bypass-detection gap
# identified in forge#1387: without this check, a spec bypass (agent never ran
# review-pr-staging) is indistinguishable from a clean gate pass because both
# previously left no comment.
#
# Trigger: pull_request targeting main (staging→main deploy PRs only).
# Non-staging→main PRs are skipped immediately (the gate only applies to deploy PRs).
#
# Gate logic:
#   1. On PR open / sync / reopen: schedule a 30-minute pending window.
#      If no gate marker is found within 30 minutes, post a warning comment and
#      fail the check.
#   2. On subsequent syncs and label/comment events: re-evaluate immediately.
#      If a marker is found, the check passes. If still absent, fail.
#
# Note: The 30-minute window is enforced by the `gate-marker-stale` job using
# a `created_at` comparison against the PR's head commit timestamp. This avoids
# requiring a scheduled workflow with PR number state.
#
# Trust model: a gate marker only counts if its author's GitHub login appears in
# the `FORGE_TRUSTED_MARKER_AUTHORS` repository variable (Settings → Actions →
# Variables → New repository variable), a comma-separated allowlist of logins
# that legitimately run /review-pr-staging. An arbitrary commenter (e.g. an
# external contributor who can comment but is not in the allowlist) cannot
# forge a passing gate by hand-typing the marker text.
#
# IMPORTANT — operator setup required: if `FORGE_TRUSTED_MARKER_AUTHORS` is
# unset or empty, NO marker is trusted and every staging→main PR will be
# treated as a gate bypass after the 30-minute window. Set this variable to
# the GitHub login(s) that run /review-pr-staging before relying on this gate.
#
# Why a repo variable and not a live permission-API lookup: GET
# /repos/{owner}/{repo}/collaborators/{username}/permission requires push/admin
# access from the calling token, which the default GITHUB_TOKEN does not have
# under this workflow's minimal `permissions:` block — and there is no
# `administration` scope available in the `permissions:` key to grant it. A
# lookup-based design would fail closed on every author, permanently blocking
# all staging→main deploys. Reading `vars.*` requires no extra token scope, so
# the allowlist is the reliable mechanism.
#
# Residual risk (accepted, out of scope): an account already in the allowlist
# could still forge its own marker — that account already has push/merge
# rights and this check cannot constrain it further.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches:
      - main
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  contents: read
  statuses: write

jobs:
  gate-marker-check:
    name: Check for FORGE gate markers
    runs-on: ubuntu-latest

    # Only run on PRs targeting main — skip all other PR events
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)

    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_CTX: ${{ github.event.pull_request.number }}
          PR_BASE_CTX: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_CTX: ${{ github.event.pull_request.head.ref }}
          PR_CREATED_CTX: ${{ github.event.pull_request.created_at }}
          ISSUE_NUMBER_CTX: ${{ github.event.issue.number }}
          REPO_CTX: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "number=$PR_NUMBER_CTX" >> "$GITHUB_OUTPUT"
            echo "base=$PR_BASE_CTX" >> "$GITHUB_OUTPUT"
            echo "head=$PR_HEAD_CTX" >> "$GITHUB_OUTPUT"
            echo "created_at=$PR_CREATED_CTX" >> "$GITHUB_OUTPUT"
          else
            # issue_comment event — fetch PR details via API
            PR_DATA=$(gh pr view "$ISSUE_NUMBER_CTX" \
              --repo "$REPO_CTX" \
              --json number,baseRefName,headRefName,createdAt \
              --jq '{number:.number,base:.baseRefName,head:.headRefName,created_at:.createdAt}')
            echo "number=$(echo "$PR_DATA" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "base=$(echo "$PR_DATA" | jq -r '.base')" >> "$GITHUB_OUTPUT"
            echo "head=$(echo "$PR_DATA" | jq -r '.head')" >> "$GITHUB_OUTPUT"
            echo "created_at=$(echo "$PR_DATA" | jq -r '.created_at')" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-deploy PRs
        id: scope
        env:
          BASE: ${{ steps.pr.outputs.base }}
          HEAD: ${{ steps.pr.outputs.head }}
        run: |
          # Gate only applies to staging→main or feature→main deploy PRs
          if [ "$BASE" != "main" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR base is '$BASE' (not main) — gate-marker-check does not apply."
          elif [ "$HEAD" != "staging" ] && [ "$HEAD" != "feature" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR head is '$HEAD' (not staging/feature) — gate-marker-check does not apply."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Deploy PR detected: $HEAD → $BASE. Running gate-marker-check."
          fi

      - name: Scan PR comments for gate markers
        id: scan
        if: steps.scope.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          TRUSTED_AUTHORS_RAW: ${{ vars.FORGE_TRUSTED_MARKER_AUTHORS }}
        run: |
          # Fetch PR comments and review comments as {login, body} JSON — author
          # identity MUST travel with the body so a marker can be attributed to
          # its actual author before it is trusted (see "Trust model" note above).
          COMMENTS_JSON=$(gh pr view "$PR_NUMBER" \
            --repo "$REPO" \
            --json comments \
            --jq '.comments' 2>/dev/null || echo "[]")

          REVIEWS_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" 2>/dev/null || echo "[]")

          # Use the real `jq` binary (not gh's --jq) with -c so every item is
          # guaranteed to be exactly one line, regardless of body content.
          ALL_ITEMS=$(
            {
              echo "$COMMENTS_JSON" | jq -c '.[] | {login: (.author.login // ""), body: (.body // "")}' 2>/dev/null
              echo "$REVIEWS_JSON"  | jq -c '.[] | {login: (.user.login // ""), body: (.body // "")}' 2>/dev/null
            } || true
          )

          # Normalize the comma-separated allowlist (repo variable) into one
          # trimmed login per line. No GitHub API call and no extra token scope
          # is needed — `vars.*` is resolved by the Actions runtime itself.
          TRUSTED_LIST=$(echo "$TRUSTED_AUTHORS_RAW" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | grep -v '^$' || true)

          if [ -z "$TRUSTED_LIST" ]; then
            echo "WARNING: FORGE_TRUSTED_MARKER_AUTHORS repo variable is unset or empty — no marker author can be trusted, every PR will be treated as a gate bypass. Configure this variable (Settings → Actions → Variables) with the login(s) that run /review-pr-staging."
          fi

          is_trusted_author() {
            local login="$1"
            if [ -z "$login" ] || [ -z "$TRUSTED_LIST" ]; then
              return 1
            fi
            echo "$TRUSTED_LIST" | grep -qxF "$login"
          }

          GATE_PASS=0
          GATE_FAILURE=0
          SPEC_LOADED=0

          while IFS= read -r ITEM; do
            if [ -z "$ITEM" ]; then
              continue
            fi
            LOGIN=$(echo "$ITEM" | jq -r '.login' 2>/dev/null || echo "")
            BODY=$(echo "$ITEM" | jq -r '.body' 2>/dev/null || echo "")

            if echo "$BODY" | grep -q '<!-- FORGE:GATE_PASS'; then
              if is_trusted_author "$LOGIN"; then
                GATE_PASS=$((GATE_PASS + 1))
              else
                echo "Ignoring FORGE:GATE_PASS marker from untrusted author '$LOGIN' (not in FORGE_TRUSTED_MARKER_AUTHORS)."
              fi
            fi
            if echo "$BODY" | grep -q '<!-- FORGE:GATE_FAILURE'; then
              if is_trusted_author "$LOGIN"; then
                GATE_FAILURE=$((GATE_FAILURE + 1))
              else
                echo "Ignoring FORGE:GATE_FAILURE marker from untrusted author '$LOGIN' (not in FORGE_TRUSTED_MARKER_AUTHORS)."
              fi
            fi
            if echo "$BODY" | grep -q '<!-- FORGE:SPEC_LOADED'; then
              if is_trusted_author "$LOGIN"; then
                SPEC_LOADED=$((SPEC_LOADED + 1))
              else
                echo "Ignoring FORGE:SPEC_LOADED marker from untrusted author '$LOGIN' (not in FORGE_TRUSTED_MARKER_AUTHORS)."
              fi
            fi
          done <<< "$ALL_ITEMS"

          echo "gate_pass=$GATE_PASS" >> "$GITHUB_OUTPUT"
          echo "gate_failure=$GATE_FAILURE" >> "$GITHUB_OUTPUT"
          echo "spec_loaded=$SPEC_LOADED" >> "$GITHUB_OUTPUT"

          if [ "$GATE_PASS" -gt 0 ]; then
            echo "marker_found=pass" >> "$GITHUB_OUTPUT"
            echo "Found trusted FORGE:GATE_PASS marker — gate ran and passed."
          elif [ "$GATE_FAILURE" -gt 0 ]; then
            echo "marker_found=failure" >> "$GITHUB_OUTPUT"
            echo "Found trusted FORGE:GATE_FAILURE marker — gate ran and BLOCKED deploy."
          else
            echo "marker_found=none" >> "$GITHUB_OUTPUT"
            echo "No trusted FORGE gate marker found on PR #$PR_NUMBER."
          fi

      - name: Check 30-minute window
        id: window
        if: |
          steps.scope.outputs.skip == 'false' &&
          steps.scan.outputs.marker_found == 'none'
        env:
          PR_CREATED: ${{ steps.pr.outputs.created_at }}
        run: |
          NOW=$(date -u +%s)
          PR_EPOCH=$(date -u -d "$PR_CREATED" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$PR_CREATED" +%s 2>/dev/null || echo 0)
          ELAPSED=$(( NOW - PR_EPOCH ))
          WINDOW=1800  # 30 minutes in seconds

          echo "PR created: $PR_CREATED (epoch: $PR_EPOCH)"
          echo "Now: $NOW, Elapsed: ${ELAPSED}s, Window: ${WINDOW}s"

          if [ "$ELAPSED" -gt "$WINDOW" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "PR is older than 30 minutes with no gate marker — treating as bypass."
          else
            REMAINING=$(( WINDOW - ELAPSED ))
            echo "stale=false" >> "$GITHUB_OUTPUT"
            echo "remaining_seconds=$REMAINING" >> "$GITHUB_OUTPUT"
            echo "PR is within the 30-minute window (${ELAPSED}s elapsed, ${REMAINING}s remaining). Gate may still be running."
          fi

      - name: Evaluate gate result
        if: steps.scope.outputs.skip == 'false'
        env:
          MARKER: ${{ steps.scan.outputs.marker_found }}
          STALE: ${{ steps.window.outputs.stale }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SPEC_LOADED: ${{ steps.scan.outputs.spec_loaded }}
          REMAINING: ${{ steps.window.outputs.remaining_seconds }}
        run: |
          if [ "$MARKER" = "pass" ]; then
            echo "✅ FORGE:GATE_PASS found — deploy gates ran and passed. PR #$PR_NUMBER is cleared for merge."
            exit 0
          fi

          if [ "$MARKER" = "failure" ]; then
            echo "⛔ FORGE:GATE_FAILURE found — deploy gate BLOCKED this PR."
            echo ""
            echo "The /review-pr-staging command ran and a deploy gate blocked this PR."
            echo "Fix the blocking issue, then re-run the staging review."
            exit 1
          fi

          # No marker found
          if [ "$STALE" = "true" ]; then
            echo "⛔ GATE BYPASS DETECTED — No FORGE gate marker found on PR #$PR_NUMBER after 30 minutes."
            echo ""
            echo "A staging→main deploy PR MUST have a FORGE:GATE_PASS or FORGE:GATE_FAILURE comment"
            echo "posted by /review-pr-staging before merge is permitted."
            echo ""
            echo "Possible causes:"
            echo "  1. The /review-pr-staging command was never run for this PR."
            echo "  2. The agent improvised instead of following the spec (spec bypass)."
            echo "  3. The review ran but was interrupted before Phase 0A completed."
            echo ""
            if [ "${SPEC_LOADED:-0}" = "0" ]; then
              echo "  ⚠️  FORGE:SPEC_LOADED marker is also absent — strong evidence the spec was never loaded."
            fi
            echo ""
            echo "Resolution: Run /review-pr $PR_NUMBER (or /review-pr staging) to complete the review."
            exit 1
          else
            echo "⏳ No gate marker yet — within 30-minute window (${REMAINING}s remaining)."
            echo ""
            echo "The /review-pr-staging spec posts gate markers during Phase 0A (open-review-finding gate)"
            echo "and Phase 6.5 (runtime test gate). If the review is still in progress, this check"
            echo "will pass once a marker is posted."
            echo ""
            echo "If the review has already completed with no marker, re-run it."
            # Exit 0 during the window — don't block while review may be in progress
            exit 0
          fi
