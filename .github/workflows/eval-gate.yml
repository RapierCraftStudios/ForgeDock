name: Pipeline Eval Gate

# Wires the eval harness (#1285) into CI so that substantive commands/ changes
# trigger an automated subset regression run, and a full corpus run is available
# on demand or on model release. (#1286)
#
# Trigger rules:
#   pull_request / push:  subset run, path-gated to substantive commands/ changes
#   workflow_dispatch:    full corpus run (on demand / model release)
#
# Substantive change definition (eval-classify-diff.sh):
#   A diff is non-substantive (skips the eval run) when EVERY changed line in
#   commands/ is one of: blank, comment (<!-- ... -->), markdown heading (#),
#   or a line that only changes whitespace. Prose edits to instructions are
#   substantive and trigger the eval.
#
# Baseline storage decision (documented here for auditability):
#   The "last known-good" scorecard is stored as a committed JSON file at
#   scripts/eval-gate-baseline.json. Rationale:
#   - Committed JSON is auditable: every baseline update appears in git blame/log.
#   - No external storage (GH cache, release asset) is needed, keeping the gate
#     dependency-free and reproducible from a cold clone.
#   - The baseline file is updated manually (or by a post-merge bot step) after a
#     deliberate improvement is confirmed. This is a conscious human gate: you
#     must explicitly bump the baseline, the pipeline does not auto-ratchet.
#   - See docs/design/eval-gate-runbook.md §Baseline for the update procedure.
#
# Regression threshold: 5 percentage points (defined in eval-gate-scorecard.mjs).
# Rate assertion is skipped for subset runs with n < 8 to avoid false positives
# from natural variance on small corpora (see scorecard script for full rationale).

on:
  pull_request:
    paths:
      - 'commands/**'
  push:
    branches:
      - staging
      - main
    paths:
      - 'commands/**'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: subset (fast) or full (complete corpus)'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - subset

concurrency:
  group: eval-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 (PR / push only): classify the diff to skip non-substantive changes.
  # ---------------------------------------------------------------------------
  classify-diff:
    name: Classify commands/ diff
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      substantive: ${{ steps.classify.outputs.substantive }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify commands/ diff
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Determine the base ref to diff against.
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            # push: diff against the previous commit on the branch
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi

          echo "Diffing commands/ from $BASE_SHA to HEAD"

          # Get all changed lines in commands/**  (added/removed, not context lines).
          DIFF_LINES=$(git diff "$BASE_SHA" HEAD -- 'commands/**' 2>/dev/null | grep '^[+-]' | grep -v '^[+-][+-][+-]' || true)

          if [ -z "$DIFF_LINES" ]; then
            echo "No commands/ lines changed — skipping eval run"
            echo "substantive=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Strip lines that are:
          #   - blank (or only whitespace)
          #   - HTML comments  <!-- ... -->
          #   - Markdown headings  # ...
          #   - Lines that only differ in leading/trailing whitespace
          # If anything substantive remains, the diff is substantive.
          SUBSTANTIVE=$(echo "$DIFF_LINES" | \
            grep -v '^[+-][[:space:]]*$' | \
            grep -v '^[+-][[:space:]]*<!--' | \
            grep -v '^[+-][[:space:]]*#' | \
            grep -v '^[+-]>>' | \
            cat || true)

          if [ -z "$SUBSTANTIVE" ]; then
            echo "Only non-substantive changes (comments, headings, blank lines) — skipping eval run"
            echo "substantive=false" >> "$GITHUB_OUTPUT"
          else
            echo "Substantive commands/ changes detected — eval run required"
            echo "substantive=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Subset eval run (triggered by substantive PR/push diff).
  # ---------------------------------------------------------------------------
  eval-subset:
    name: Pipeline eval — subset run
    runs-on: ubuntu-latest
    needs: [classify-diff]
    if: |
      needs.classify-diff.outputs.substantive == 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run subset eval harness
        id: eval
        run: |
          # The eval harness (#1285) writes a scorecard to stdout and exits non-zero
          # on harness-level failure (not pipeline regression — that's the gate's job).
          # We capture the scorecard JSON and feed it to the gate aggregator.
          #
          # Expected invocation once #1285 ships:
          #   node scripts/eval-harness-runner.mjs --mode subset --output scorecard.json
          #
          # Until #1285 is complete, this check cannot certify a real result — it MUST
          # fail explicitly rather than fabricate a passing scorecard. A stub that copies
          # the committed baseline into scorecard.json always reports a pass (fresh ==
          # baseline), which is a green status this gate has never actually earned.
          # This step intentionally does not do that. (forge#1605)
          if [ -f "scripts/eval-harness-runner.mjs" ]; then
            node scripts/eval-harness-runner.mjs --mode subset --output scorecard.json
            echo "harness_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::eval-harness-runner.mjs not yet present (#1285) — this check cannot certify a real eval result yet and will not fabricate a passing scorecard."
            echo "harness_ran=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Run eval regression gate
        if: steps.eval.outputs.harness_ran == 'true'
        run: |
          node scripts/eval-gate-scorecard.mjs scorecard.json scripts/eval-gate-baseline.json

      - name: Upload scorecard artifact
        if: always() && steps.eval.outputs.harness_ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard-subset-${{ github.sha }}
          path: scorecard.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Full corpus eval run (workflow_dispatch only).
  # ---------------------------------------------------------------------------
  eval-full:
    name: Pipeline eval — full corpus run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Determine run mode
        id: mode
        env:
          RUN_MODE_INPUT: ${{ github.event.inputs.run_mode }}
        run: |
          # Allowlist validation: choice inputs are not server-enforced via the API.
          # Default to 'full' if an unrecognized value is supplied.
          case "${RUN_MODE_INPUT:-full}" in
            full|subset) RUN_MODE_SAFE="${RUN_MODE_INPUT:-full}" ;;
            *)
              echo "WARNING: unrecognized run_mode '${RUN_MODE_INPUT}' — defaulting to 'full'"
              RUN_MODE_SAFE="full"
              ;;
          esac
          echo "run_mode=${RUN_MODE_SAFE}" >> "$GITHUB_OUTPUT"

      - name: Run full eval harness
        id: eval
        run: |
          MODE="$RUN_MODE"
          echo "Running eval harness in mode: $MODE"
          # Until #1285 lands, this check cannot certify a real result — it MUST fail
          # explicitly rather than fabricate a passing scorecard from the baseline.
          # See the eval-subset job above for the full rationale. (forge#1605)
          if [ -f "scripts/eval-harness-runner.mjs" ]; then
            node scripts/eval-harness-runner.mjs --mode "$MODE" --output scorecard.json
            echo "harness_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::eval-harness-runner.mjs not yet present (#1285) — this check cannot certify a real eval result yet and will not fabricate a passing scorecard."
            echo "harness_ran=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}

      - name: Run eval regression gate
        if: steps.eval.outputs.harness_ran == 'true'
        run: |
          node scripts/eval-gate-scorecard.mjs scorecard.json scripts/eval-gate-baseline.json

      - name: Upload scorecard artifact
        if: always() && steps.eval.outputs.harness_ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard-full-${{ github.sha }}
          path: scorecard.json
          retention-days: 90
