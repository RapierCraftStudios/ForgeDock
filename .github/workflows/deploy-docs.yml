name: Deploy Documentation Site

on:
  push:
    # Deploy only on main — GitHub Pages has a single production endpoint.
    # Staging pushes must not overwrite the live site with WIP content.
    # Use workflow_dispatch below to manually validate docs from a staging build.
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'package.json'

  # Allow manual trigger from GitHub Actions UI (use this for staging validation)
  workflow_dispatch:

# Allow one concurrent deploy; cancel in-flight runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build documentation site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
