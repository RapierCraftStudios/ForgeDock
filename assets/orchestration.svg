<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="ForgeDock orchestration: one milestone fanned out into parallel work-on pipelines, each issue advancing through investigating, building, in-review, and merged">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- figure background -->
  <rect x="1" y="1" width="1198" height="428" rx="16" fill="#0d1117" stroke="#30363d"/>
  <rect x="1" y="1" width="1198" height="428" rx="16" fill="url(#grid)" opacity="0.5"/>
  <rect x="1" y="1" width="1198" height="3" fill="#58a6ff" opacity="0.8"/>

  <!-- header -->
  <text x="40" y="42" font-family="monospace,'Courier New',Courier" font-size="18" fill="#e6edf3"><tspan fill="#58a6ff">/orchestrate</tspan> milestone/checkout-v2<tspan fill="#6e7681">  ·  Wave 1</tspan></text>

  <!-- milestone card -->
  <rect x="40" y="150" width="164" height="130" rx="10" fill="#161b22" stroke="#30363d"/>
  <rect x="40" y="150" width="4" height="130" rx="2" fill="#58a6ff"/>
  <text x="62" y="185" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" fill="#8b949e">milestone</text>
  <text x="62" y="213" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">checkout-v2</text>
  <text x="62" y="252" font-family="monospace,'Courier New',Courier" font-size="14" fill="#58a6ff">4 issues → decompose</text>

  <!-- fan-out connectors -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M204,205 C232,205 232,90 250,90"/>
    <path d="M204,210 C232,210 232,180 250,180"/>
    <path d="M204,220 C232,220 232,270 250,270"/>
    <path d="M204,225 C232,225 232,360 250,360"/>
  </g>

  <!-- ============ LANES ============ -->
  <!-- lane template: rect + issue label + 4 stage dots + state pill -->

  <!-- Lane 1: #61 merged (4/4) -->
  <rect x="250" y="55" width="800" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="270" y="88" font-family="monospace,'Courier New',Courier" font-size="14" fill="#e6edf3"><tspan fill="#58a6ff" font-weight="700">#61</tspan>  fix payment nil-check</text>
  <line x1="562" y1="90" x2="742" y2="90" stroke="#30363d" stroke-width="2"/>
  <circle cx="562" cy="90" r="7" fill="#3fb950"/><circle cx="622" cy="90" r="7" fill="#3fb950"/><circle cx="682" cy="90" r="7" fill="#3fb950"/><circle cx="742" cy="90" r="7" fill="#3fb950"/>
  <rect x="882" y="75" width="150" height="30" rx="15" fill="#238636"/>
  <text x="957" y="95" font-family="monospace,'Courier New',Courier" font-size="13" fill="#ffffff" text-anchor="middle">✓ merged</text>

  <!-- Lane 2: #62 in-review (3/4) -->
  <rect x="250" y="145" width="800" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="270" y="178" font-family="monospace,'Courier New',Courier" font-size="14" fill="#e6edf3"><tspan fill="#58a6ff" font-weight="700">#62</tspan>  free-tier invoice guard</text>
  <line x1="562" y1="180" x2="742" y2="180" stroke="#30363d" stroke-width="2"/>
  <circle cx="562" cy="180" r="7" fill="#3fb950"/><circle cx="622" cy="180" r="7" fill="#3fb950"/><circle cx="682" cy="180" r="7" fill="#3fb950"/><circle cx="742" cy="180" r="7" fill="#30363d"/>
  <rect x="882" y="165" width="150" height="30" rx="15" fill="#9e6a03"/>
  <text x="957" y="185" font-family="monospace,'Courier New',Courier" font-size="13" fill="#ffffff" text-anchor="middle">in-review</text>

  <!-- Lane 3: #63 building (2/4) -->
  <rect x="250" y="235" width="800" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="270" y="268" font-family="monospace,'Courier New',Courier" font-size="14" fill="#e6edf3"><tspan fill="#58a6ff" font-weight="700">#63</tspan>  subscription race fix</text>
  <line x1="562" y1="270" x2="742" y2="270" stroke="#30363d" stroke-width="2"/>
  <circle cx="562" cy="270" r="7" fill="#3fb950"/><circle cx="622" cy="270" r="7" fill="#3fb950"/><circle cx="682" cy="270" r="7" fill="#30363d"/><circle cx="742" cy="270" r="7" fill="#30363d"/>
  <rect x="882" y="255" width="150" height="30" rx="15" fill="#6e40c9"/>
  <text x="957" y="275" font-family="monospace,'Courier New',Courier" font-size="13" fill="#ffffff" text-anchor="middle">building</text>

  <!-- Lane 4: #64 investigating (1/4) -->
  <rect x="250" y="325" width="800" height="70" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="270" y="358" font-family="monospace,'Courier New',Courier" font-size="14" fill="#e6edf3"><tspan fill="#58a6ff" font-weight="700">#64</tspan>  audit-log on early return</text>
  <line x1="562" y1="360" x2="742" y2="360" stroke="#30363d" stroke-width="2"/>
  <circle cx="562" cy="360" r="7" fill="#3fb950"/><circle cx="622" cy="360" r="7" fill="#30363d"/><circle cx="682" cy="360" r="7" fill="#30363d"/><circle cx="742" cy="360" r="7" fill="#30363d"/>
  <rect x="882" y="345" width="150" height="30" rx="15" fill="#1f6feb"/>
  <text x="957" y="365" font-family="monospace,'Courier New',Courier" font-size="13" fill="#ffffff" text-anchor="middle">investigating</text>

  <!-- converge connectors to staging -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M1050,90 C1068,90 1068,205 1086,205"/>
    <path d="M1050,180 C1068,180 1068,210 1086,210"/>
    <path d="M1050,270 C1068,270 1068,220 1086,220"/>
    <path d="M1050,360 C1068,360 1068,225 1086,225"/>
  </g>

  <!-- staging node -->
  <rect x="1086" y="150" width="90" height="130" rx="10" fill="#161b22" stroke="#3fb950"/>
  <text x="1131" y="205" font-family="-apple-system,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#3fb950" text-anchor="middle">staging</text>
  <text x="1131" y="230" font-family="monospace,'Courier New',Courier" font-size="12" fill="#8b949e" text-anchor="middle">↑ PRs</text>

  <!-- legend -->
  <text x="270" y="420" font-family="monospace,'Courier New',Courier" font-size="12" fill="#6e7681">stages:  investigate → build → review → merge     ·     labels update live as each agent advances</text>
</svg>
