<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient: deep dark blue-black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <!-- Accent glow for the logo area -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0" />
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2233" stroke-width="0.5"/>
    </pattern>
    <!-- Blue accent glow filter -->
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for pipeline nodes -->
    <filter id="nodeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Subtle grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.4"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#58a6ff" opacity="0.8"/>

  <!-- Left content column -->

  <!-- Logo glow circle -->
  <circle cx="120" cy="120" r="100" fill="url(#logoGlow)"/>

  <!-- ForgeDock Logo Mark: stylized anvil/forge + dock icon -->
  <!-- Outer hexagon background -->
  <polygon points="120,50 172,80 172,140 120,170 68,140 68,80" fill="#161b22" stroke="#58a6ff" stroke-width="2" opacity="0.9"/>
  <!-- Inner forge ⚡ symbol -->
  <text x="120" y="135" font-family="monospace, 'Courier New', Courier" font-size="62" font-weight="bold" fill="#58a6ff" text-anchor="middle" filter="url(#blueGlow)">⚡</text>

  <!-- ForgeDock wordmark -->
  <text x="88" y="225" font-family="monospace, 'Courier New', Courier" font-size="54" font-weight="bold" fill="#e6edf3" letter-spacing="-1">Forge</text>
  <text x="88" y="225" font-family="monospace, 'Courier New', Courier" font-size="54" font-weight="bold" fill="#58a6ff" letter-spacing="-1">
    <tspan dx="166">Dock</tspan>
  </text>

  <!-- Divider line -->
  <line x1="88" y1="248" x2="480" y2="248" stroke="#30363d" stroke-width="1"/>

  <!-- Primary hook text -->
  <text x="88" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#e6edf3">GitHub as a Knowledge Graph</text>
  <text x="88" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#58a6ff">for AI Agents</text>

  <!-- Sub-hook text -->
  <text x="88" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#8b949e" font-weight="400">Issue in → PR out. Your AI agent never forgets.</text>

  <!-- CTA tag -->
  <rect x="88" y="450" width="300" height="42" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="108" y="477" font-family="monospace, 'Courier New', Courier" font-size="18" fill="#7ee787">$</text>
  <text x="128" y="477" font-family="monospace, 'Courier New', Courier" font-size="18" fill="#e6edf3">npx forgedock</text>

  <!-- Bottom left: badge row -->
  <rect x="88" y="522" width="120" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="148" y="543" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Claude Code</text>

  <rect x="220" y="522" width="110" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="543" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">AGPL-3.0</text>

  <rect x="342" y="522" width="120" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="402" y="543" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Open Source</text>


  <!-- Right column: Pipeline diagram -->
  <!-- Terminal window frame -->
  <rect x="580" y="60" width="640" height="520" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Terminal title bar -->
  <rect x="580" y="60" width="640" height="40" rx="12" fill="#21262d"/>
  <rect x="580" y="88" width="640" height="12" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="612" cy="80" r="7" fill="#ff5f56"/>
  <circle cx="636" cy="80" r="7" fill="#ffbd2e"/>
  <circle cx="660" cy="80" r="7" fill="#27c93f"/>
  <!-- Terminal title -->
  <text x="900" y="85" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#6e7681" text-anchor="middle">forgedock pipeline</text>

  <!-- Terminal content: pipeline flow visualization -->
  <!-- Prompt line -->
  <text x="608" y="140" font-family="monospace, 'Courier New', Courier" font-size="15" fill="#7ee787">you@dev</text>
  <text x="690" y="140" font-family="monospace, 'Courier New', Courier" font-size="15" fill="#6e7681">:</text>
  <text x="698" y="140" font-family="monospace, 'Courier New', Courier" font-size="15" fill="#58a6ff">~/project</text>
  <text x="795" y="140" font-family="monospace, 'Courier New', Courier" font-size="15" fill="#e6edf3">$ /work-on #42</text>

  <!-- Pipeline stage blocks -->

  <!-- Stage 1: Investigate -->
  <rect x="608" y="160" width="590" height="68" rx="6" fill="#0d1117" stroke="#1f3b5a" stroke-width="1"/>
  <rect x="608" y="160" width="4" height="68" rx="2" fill="#58a6ff"/>
  <text x="626" y="182" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#58a6ff">FORGE:INVESTIGATOR</text>
  <text x="626" y="202" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">Verdict: CONFIRMED · Root cause: line 247</text>
  <text x="626" y="220" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">Affected files: 3 · Decompose: NO</text>
  <!-- Check mark -->
  <text x="1160" y="200" font-family="monospace" font-size="18" fill="#3fb950">✓</text>

  <!-- Arrow -->
  <line x1="900" y1="228" x2="900" y2="242" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Stage 2: Build -->
  <rect x="608" y="242" width="590" height="68" rx="6" fill="#0d1117" stroke="#1f3b5a" stroke-width="1"/>
  <rect x="608" y="242" width="4" height="68" rx="2" fill="#d2a8ff"/>
  <text x="626" y="264" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#d2a8ff">FORGE:ARCHITECT + FORGE:BUILDER</text>
  <text x="626" y="284" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">3 files changed · Quality gate: PASS</text>
  <text x="626" y="302" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">Branch: feat/fix-auth-token-42</text>
  <text x="1160" y="282" font-family="monospace" font-size="18" fill="#3fb950">✓</text>

  <!-- Arrow -->
  <line x1="900" y1="310" x2="900" y2="324" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Stage 3: Review -->
  <rect x="608" y="324" width="590" height="68" rx="6" fill="#0d1117" stroke="#1f3b5a" stroke-width="1"/>
  <rect x="608" y="324" width="4" height="68" rx="2" fill="#ffa657"/>
  <text x="626" y="346" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#ffa657">FORGE:REVIEWER (9 agents)</text>
  <text x="626" y="366" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">Security · Tests · Perf · Auth · DB · API</text>
  <text x="626" y="384" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">PR #127 → review findings → issues filed</text>
  <text x="1160" y="364" font-family="monospace" font-size="18" fill="#3fb950">✓</text>

  <!-- Arrow -->
  <line x1="900" y1="392" x2="900" y2="406" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Stage 4: Merged -->
  <rect x="608" y="406" width="590" height="68" rx="6" fill="#0d1117" stroke="#1f3b5a" stroke-width="1"/>
  <rect x="608" y="406" width="4" height="68" rx="2" fill="#3fb950"/>
  <text x="626" y="428" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#3fb950">FORGE:TRAJECTORY</text>
  <text x="626" y="448" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">PR merged · Issue closed · Worktree removed</text>
  <text x="626" y="466" font-family="monospace, 'Courier New', Courier" font-size="12" fill="#8b949e">Context preserved forever in GitHub</text>
  <text x="1160" y="446" font-family="monospace" font-size="18" fill="#3fb950">✓</text>

  <!-- Bottom note inside terminal -->
  <text x="900" y="520" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#3fb950" text-anchor="middle">Every agent reads what came before.</text>
  <text x="900" y="542" font-family="monospace, 'Courier New', Courier" font-size="13" fill="#3fb950" text-anchor="middle">Nothing is lost between conversations.</text>

  <!-- Bottom border accent -->
  <rect x="0" y="637" width="1280" height="3" fill="#58a6ff" opacity="0.4"/>
</svg>
